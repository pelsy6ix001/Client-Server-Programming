<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated MCQ Grading & Assessment System</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #64748b;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            color: #334155;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }

        .question-block {
            padding: 1rem 0;
            border-bottom: 1px dashed var(--border);
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #334155;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            padding: 0.25rem 0;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .hidden {
            display: none !important;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .metric-box {
            background: var(--background);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-label {
            font-size: 0.85rem;
            color: #64748b;
        }

        .review-item {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--border);
            background: var(--background);
        }

        .review-item.correct {
            border-left-color: var(--success);
            background-color: #f0fdf4;
        }

        .review-item.incorrect {
            border-left-color: var(--danger);
            background-color: #fef2f2;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            float: right;
        }

        .correct .status-badge {
            background: #dcfce7;
            color: var(--success);
        }

        .incorrect .status-badge {
            background: #fee2e2;
            color: var(--danger);
        }

        .badge-choice {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            background: #e2e8f0;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>AutoGradr</h1>
            <p>Automated MCQ Grading & Assessment System</p>
        </header>

        <div class="card">
            <h2>Submit Student Responses</h2>
            <form id="submissionForm">
                <div class="form-group">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" placeholder="Enter student's full name" required>
                </div>
                <div id="sheetContainer">
                    </div>
                <button type="submit" class="btn">Grade Answer Sheet</button>
            </form>
        </div>

        <div class="card hidden" id="resultsCard">
            <h2>Performance & Evaluation Report</h2>
            
            <div class="metrics">
                <div class="metric-box">
                    <div class="metric-value" id="resName">-</div>
                    <div class="metric-label">Student</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="resScore">-</div>
                    <div class="metric-label">Score / Percentage</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="resGrade">-</div>
                    <div class="metric-label">Status</div>
                </div>
            </div>

            <h3>Item Analysis & Review</h3>
            <div id="reviewContainer" style="margin-top: 1rem;">
                </div>
        </div>
    </div>

    <script>
        // Centralized Dataset
        const quizBank = [
            {
                id: 1,
                question: "What is the capital city of France?",
                choices: { A: "London", B: "Berlin", C: "Paris", D: "Rome" },
                correctKey: "C"
            },
            {
                id: 2,
                question: "Which planet is commonly known as the Red Planet?",
                choices: { A: "Earth", B: "Mars", C: "Jupiter", D: "Saturn" },
                correctKey: "B"
            },
            {
                id: 3,
                question: "What is the largest ocean on Planet Earth?",
                choices: { A: "Atlantic Ocean", B: "Indian Ocean", C: "Arctic Ocean", D: "Pacific Ocean" },
                correctKey: "D"
            },
            {
                id: 4,
                question: "How many days are there normally in a standard year?",
                choices: { A: "365", B: "366", C: "360", D: "350" },
                correctKey: "A"
            },
            {
                id: 5,
                question: "What is the primary chemical element that makes up water?",
                choices: { A: "Helium", B: "Carbon", C: "Hydrogen and Oxygen", D: "Nitrogen" },
                correctKey: "C"
            }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            renderAssessmentInterface();
        });

        // Generate the student questionnaire
        function renderAssessmentInterface() {
            const sheetContainer = document.getElementById('sheetContainer');
            let sheetHtml = '';

            quizBank.forEach((item) => {
                sheetHtml += `
                    <div class="question-block">
                        <div class="question-text">Q${item.id}: ${item.question}</div>
                        <div class="options-group">
                            ${Object.entries(item.choices).map(([key, value]) => `
                                <label class="option-label">
                                    <input type="radio" name="sheet_q${item.id}" value="${key}" required> 
                                    <strong>${key}:</strong> ${value}
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            sheetContainer.innerHTML = sheetHtml;
        }

        // Processing & Performance Calculations Engine
        document.getElementById('submissionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const studentName = document.getElementById('studentName').value;
            const studentFormData = new FormData(this);

            let rawScore = 0;
            let analysisReport = [];

            quizBank.forEach((item) => {
                const studentSelection = studentFormData.get(`sheet_q${item.id}`);
                const isCorrect = studentSelection === item.correctKey;

                if (isCorrect) rawScore++;

                analysisReport.push({
                    id: item.id,
                    questionText: item.question,
                    studentChoice: studentSelection,
                    studentChoiceText: item.choices[studentSelection],
                    status: isCorrect
                });
            });

            compileDashboard(studentName, rawScore, analysisReport);
        });

        // Outputs calculations to visual dashboard panels
        function compileDashboard(name, score, report) {
            const totalQuestions = quizBank.length;
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('resName').textContent = name;
            document.getElementById('resScore').textContent = `${score} / ${totalQuestions} (${percentage}%)`;
            
            const gradeBox = document.getElementById('resGrade');
            if (percentage >= 60) {
                gradeBox.textContent = "PASS";
                gradeBox.style.color = "var(--success)";
            } else {
                gradeBox.textContent = "FAIL";
                gradeBox.style.color = "var(--danger)";
            }

            const reviewContainer = document.getElementById('reviewContainer');
            reviewContainer.innerHTML = '';

            report.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `review-item ${item.status ? 'correct' : 'incorrect'}`;
                
                // Displays the question status and selection without revealing the target answer
                itemDiv.innerHTML = `
                    <span class="status-badge">${item.status ? 'Correct' : 'Incorrect'}</span>
                    <h4>Question ${item.id}: ${item.questionText}</h4>
                    <p style="margin-top: 0.5rem;">
                        Student Selection: <span class="badge-choice">${item.studentChoice}</span> (${item.studentChoiceText})
                    </p>
                `;
                reviewContainer.appendChild(itemDiv);
            });

            document.getElementById('resultsCard').classList.remove('hidden');
            document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
